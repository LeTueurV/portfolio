  /dashboard/messages:
    get:
      tags:
        - Dashboard
      summary: Lister les messages (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Messages

    post:
      tags:
        - Dashboard
      summary: Créer un message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
                active:
                  type: boolean
                display_from:
                  type: string
                  format: date-time
                display_until:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Créé

  /dashboard/messages/{id}:
    get:
      tags:
        - Dashboard
      summary: Détail d'un message
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Message

    put:
      tags:
        - Dashboard
      summary: Modifier un message
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportantMessage'
      responses:
        '200':
          description: Modifié

    patch:
      tags:
        - Dashboard
      summary: Toggle activation d'un message
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Togglé

    delete:
      tags:
        - Dashboard
      summary: Supprimer un message
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Supprimé

  /images/portfolio:
    post:
      tags:
        - Images
      summary: Upload photo de profil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        '200':
          description: uploadée

    delete:
      tags:
        - Images
      summary: Supprimer photo de profil
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Supprimée

  /images/projects/{projectId}:
    get:
