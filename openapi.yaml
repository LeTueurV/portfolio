    post:
      tags:
        - Dashboard
      summary: Créer une compétence
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, label]
              properties:
                code:
                  type: string
                  example: "PHP"
                label:
                  type: string
                  example: "PHP Backend"
                bloc:
                  type: string
                  example: "B1.1"
      responses:
        '201':
          description: Créée

  /dashboard/competences/{id}:
    get:
      tags:
        - Dashboard
      summary: Détail d'une compétence
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Compétence

    put:
      tags:
        - Dashboard
      summary: Modifier une compétence
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Competence'
      responses:
        '200':
          description: Modifiée

    delete:
      tags:
        - Dashboard
      summary: Supprimer une compétence
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Supprimée

  /dashboard/formations:
    get:
      tags:
        - Dashboard
      summary: Lister les formations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Formations

    post:
      tags:
        - Dashboard
      summary: Créer une formation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [school, degree]
              properties:
                school:
                  type: string
                degree:
                  type: string
                field:
                  type: string
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                description:
                  type: string
      responses:
        '201':
          description: Créée

  /dashboard/formations/{id}:
    get:
      tags:
        - Dashboard
      summary: Détail d'une formation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Formation

    put:
      tags:
        - Dashboard
      summary: Modifier une formation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Formation'
      responses:
        '200':
          description: Modifiée

    delete:
      tags:
        - Dashboard
      summary: Supprimer une formation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
